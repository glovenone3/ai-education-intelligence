<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>政策库 - 乐途智学“AI+教育”政策文献知识库</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="wrap">
    <section>
      <div class="section-head">
        <h2>政策库</h2>
        <span class="hint">默认按发布日期由新到旧排列</span>
      </div>
      <div class="toolbar">
        <button type="button" id="download-md">下载当前列表MD</button>
        <button type="button" id="download-doc">下载当前列表Word</button>
      </div>
      <div class="tabs" id="region-tabs"></div>
      <div id="list"></div>
    </section>
  </main>
  <script src="./app.js"></script>
  <script>
    App.shell("政策库", "按国家、省市和业务相关性整理政策依据，优先展示近期文件。");
    let active = "全部";
    let visible = [];
    App.load().then((data) => {
      App.setUpdated(data);
      const items = App.sortByDate(data.items.filter((item) => ["政策", "政策解读"].includes(item.type)));
      const regions = ["全部", ...Array.from(new Set(items.map((item) => item.region)))];
      function render() {
        document.querySelector("#region-tabs").innerHTML = regions.map((region) => `
          <button class="tab ${region === active ? "active" : ""}" data-region="${App.esc(region)}">${App.esc(region)}</button>
        `).join("");
        document.querySelectorAll(".tab").forEach((button) => {
          button.addEventListener("click", () => {
            active = button.dataset.region;
            render();
          });
        });
        visible = active === "全部" ? items : items.filter((item) => item.region === active);
        document.querySelector("#list").innerHTML = visible.map(App.resourceCard).join("") || '<div class="empty">暂无政策资料。</div>';
      }
      render();
      App.bindResourceDownloads(document.querySelector("#list"), items);
      App.bindCollectionDownload(document.querySelector("#download-md"), "政策库", () => visible, "md");
      App.bindCollectionDownload(document.querySelector("#download-doc"), "政策库", () => visible, "doc");
    });
  </script>
</body>
</html>
