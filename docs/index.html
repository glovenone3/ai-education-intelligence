<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 教育资料收集库</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #166534;
      --accent-bg: #e8f5ec;
      --chip: #eef2f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.55;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    .wrap {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }

    .top {
      padding: 28px 0 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 4vw, 34px);
      font-weight: 750;
      letter-spacing: 0;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      padding: 18px 0 24px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1.2;
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
    }

    main {
      padding: 22px 0 42px;
    }

    .filters {
      display: grid;
      grid-template-columns: 1fr 160px 160px 180px;
      gap: 10px;
      margin-bottom: 16px;
    }

    input,
    select {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      padding: 0 12px;
      font: inherit;
    }

    .item {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .item h2 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--chip);
      color: #344054;
      font-size: 12px;
    }

    .type {
      background: var(--accent-bg);
      color: var(--accent);
      font-weight: 650;
    }

    .summary {
      margin: 0 0 10px;
    }

    .relation {
      margin: 0 0 12px;
      color: #344054;
      font-size: 14px;
    }

    a {
      color: #175cd3;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .empty {
      background: var(--panel);
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 820px) {
      .stats,
      .filters {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 560px) {
      .wrap {
        width: min(100% - 20px, 1180px);
      }

      .stats,
      .filters {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap top">
      <h1>AI 教育资料收集库</h1>
      <p class="sub">内部使用：每周整理政策、专家观点、文献和报道，保留来源与出处。</p>
    </div>
  </header>

  <main class="wrap">
    <section class="stats" aria-label="资料统计">
      <div class="stat"><strong id="stat-total">0</strong><span>全部资料</span></div>
      <div class="stat"><strong id="stat-week">0</strong><span>本周新增</span></div>
      <div class="stat"><strong id="stat-policy">0</strong><span>政策</span></div>
      <div class="stat"><strong id="stat-expert">0</strong><span>专家观点</span></div>
      <div class="stat"><strong id="stat-paper">0</strong><span>文献</span></div>
    </section>

    <section class="filters" aria-label="筛选资料">
      <input id="search" type="search" placeholder="搜索标题、摘要、关键词、来源">
      <select id="type">
        <option value="">全部类型</option>
        <option value="政策">政策</option>
        <option value="专家观点">专家观点</option>
        <option value="文献">文献</option>
        <option value="报道">报道</option>
      </select>
      <select id="region">
        <option value="">全部地区</option>
        <option value="国家">国家</option>
        <option value="省级">省级</option>
        <option value="市级">市级</option>
        <option value="其他">其他</option>
      </select>
      <select id="topic">
        <option value="">全部方向</option>
        <option value="AI教育">AI教育</option>
        <option value="AI素养">AI素养</option>
        <option value="过程性评价">过程性评价</option>
        <option value="综合素质评价">综合素质评价</option>
        <option value="五育">五育</option>
        <option value="教育数字化">教育数字化</option>
      </select>
    </section>

    <section id="list" aria-live="polite"></section>
  </main>

  <script>
    const state = {
      items: [],
      filters: {
        search: "",
        type: "",
        region: "",
        topic: ""
      }
    };

    const fields = ["title", "summary", "source", "region", "type", "businessRelation"];

    function textOf(item) {
      return [
        ...fields.map((key) => item[key] || ""),
        ...(item.keywords || []),
        ...(item.topics || [])
      ].join(" ").toLowerCase();
    }

    function matches(item) {
      const query = state.filters.search.trim().toLowerCase();
      if (query && !textOf(item).includes(query)) return false;
      if (state.filters.type && item.type !== state.filters.type) return false;
      if (state.filters.region && item.region !== state.filters.region) return false;
      if (state.filters.topic && !(item.topics || []).includes(state.filters.topic)) return false;
      return true;
    }

    function formatDate(value) {
      return value || "日期待补";
    }

    function renderStats(data) {
      const summary = data.summary || {};
      document.querySelector("#stat-total").textContent = summary.total || data.items.length || 0;
      document.querySelector("#stat-week").textContent = summary.thisWeek || 0;
      document.querySelector("#stat-policy").textContent = summary.policies || 0;
      document.querySelector("#stat-expert").textContent = summary.expertViews || 0;
      document.querySelector("#stat-paper").textContent = summary.papers || 0;
    }

    function renderList() {
      const list = document.querySelector("#list");
      const items = state.items.filter(matches);

      if (!items.length) {
        list.innerHTML = '<div class="empty">暂无匹配资料。每周更新后会显示在这里。</div>';
        return;
      }

      list.innerHTML = items.map((item) => {
        const keywords = (item.keywords || []).map((tag) => `<span class="tag">${tag}</span>`).join("");
        const topics = (item.topics || []).map((tag) => `<span class="tag">${tag}</span>`).join("");
        const link = item.url ? `<a href="${item.url}" target="_blank" rel="noopener">查看原文</a>` : "";

        return `
          <article class="item">
            <h2>${item.title || "未命名资料"}</h2>
            <div class="meta">
              <span class="tag type">${item.type || "未分类"}</span>
              <span>${formatDate(item.date)}</span>
              <span>${item.region || "地区待补"}</span>
              <span>${item.source || "来源待补"}</span>
            </div>
            <p class="summary">${item.summary || ""}</p>
            ${item.businessRelation ? `<p class="relation"><strong>业务关系：</strong>${item.businessRelation}</p>` : ""}
            <div class="meta">${keywords}${topics}</div>
            ${link}
          </article>
        `;
      }).join("");
    }

    function bindFilters() {
      ["search", "type", "region", "topic"].forEach((id) => {
        document.querySelector(`#${id}`).addEventListener("input", (event) => {
          state.filters[id] = event.target.value;
          renderList();
        });
      });
    }

    fetch("./data.json")
      .then((response) => response.json())
      .then((data) => {
        state.items = (data.items || []).sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")));
        renderStats(data);
        renderList();
        bindFilters();
      })
      .catch(() => {
        document.querySelector("#list").innerHTML = '<div class="empty">无法读取 data.json。</div>';
      });
  </script>
</body>
</html>
